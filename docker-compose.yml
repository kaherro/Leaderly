services:
  redis:
    image: redis:7
    container_name: leaderly-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: leaderly-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-2991}
      POSTGRES_DB: ${POSTGRES_DB:-leaderly}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

  ws-api:
    image: python:3.11-slim
    container_name: leaderly-ws-api
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PG_HOST: postgres
      PG_PASSWORD: ${POSTGRES_PASSWORD:-2991}
      PG_DBNAME: ${POSTGRES_DB:-leaderly}
    volumes:
      - ./:/app
    command: bash -c "pip install -r requirements.txt && python src/api/ws_api.py"
    depends_on:
      - redis
      - postgres

volumes:
  postgres-data: